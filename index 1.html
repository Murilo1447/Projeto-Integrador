<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>FixCity</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<header>
  <h1>FixCity</h1>
  <p>Plataforma oficial de registro de problemas urbanos</p>
  <button onclick="irParaDenuncias()">Denúncias</button>
</header>

<div class="container">

 
  

  <!-- Mapa -->
  <div class="card mapa-container">
    <h2>Mapa de Situações</h2>
    <div class="search-container">
  <input type="text" placeholder="Buscar localização..." class="search"></div>
    <div id="map"></div>

    <!-- Legenda -->
    <div class="legenda">
      <div><span class="dot green"></span> Resolvido</div>
      <div><span class="dot yellow"></span> Em andamento</div>
      <div><span class="dot red"></span> Não resolvido</div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script 1.js"></script>
</body>
</html>
