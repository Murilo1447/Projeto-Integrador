<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FixCity</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Entrar</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mensagens">
            {% for category, message in messages %}
              <div class="mensagem {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form id="formLogin" method="post">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" name="email" placeholder="Email" value="{{ form_data.email }}" required>

        <label for="loginSenha">Senha</label>
        <input type="password" id="loginSenha" name="senha" placeholder="Senha" required>

        <button type="submit">Entrar</button>
      </form>

      <div class="auth-footer">
        Nao tem conta?
        <a href="{{ url_for('cadastro') }}">Cadastrar</a>
      </div>
    </div>
  </div>
</body>
</html>
