<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixCity</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <div class="header-texto">
            <div class="logo-titulo">
                <img src="/templates/fixcity/images/logo.png" alt="Logo FixCity" class="logo">
                <h1>FixCity</h1>
            </div>
            <p>Registrar novo problema urbano</p>
        </div>

        <div class="botoes-header">
            <button onclick="window.location.href='index.html'">
                Voltar
            </button>
        </div>

    </header>

    <div class="container">

        <div class="box">
            <h2>Novo Chamado</h2>

            <form id="form">


                <input type="text" id="nome" placeholder="Nome (opcional)">
                <input type="email" id="email" placeholder="Email (opcional)">
                <div class="upload-container">
                     <span class="emoji-upload">📎</span>
                    <label for="foto" class="upload-label">
                        Selecionar imagem
                    </label>
                    <input type="file" id="foto" accept="image/*">
                    <span id="nomeArquivo" class="nome-arquivo"></span>
                </div>

                <select id="categoria" required>
                    <option value="">Selecione o problema</option>
                    <option>Buraco</option>
                    <option>Lixo</option>
                    <option>Iluminação</option>
                    <option>Outro</option>
                </select>

                <input type="text" id="cep" placeholder="Digite o CEP" onblur="buscarCEP()">

                <input type="text" id="rua" placeholder="Rua" readonly>
                <input type="text" id="bairro" placeholder="Bairro" readonly>
                <input type="text" id="cidade" placeholder="Cidade" readonly>

                <input type="text" id="numero" placeholder="Número da residência">

                <textarea id="descricao" placeholder="Comentário sobre o problema..." required></textarea>

                <button type="submit">Registrar Chamado</button>

            </form>
        </div>

        <div class="box">
            <h2>Denúncia</h2>
            <div id="lista"></div>
        </div>

    </div>

    <script>
        function buscarCEP() {
            let cep = document.getElementById("cep").value.replace(/\D/g, "");

            if (cep.length !== 8) {
                alert("Digite um CEP válido");
                return;
            }

            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(dados => {
                    document.getElementById("rua").value = dados.logradouro;
                    document.getElementById("bairro").value = dados.bairro;
                    document.getElementById("cidade").value = dados.localidade;
                });
        }


        function voltar() {
            window.location.href = "index 1.html";
        }

    </script>
    <script src="denuncias.js"></script>
</body>

</html>
